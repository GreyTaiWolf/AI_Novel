name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - fix-ai-connection-failure
    tags:
      - "apk-*"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        run: npm ci

      - name: Prepare static web assets
        run: |
          rm -rf www
          mkdir -p www
          cp index.html styles.css app.js manifest.json www/
          cp -R data www/data

      - name: Install Capacitor
        run: npm install --no-save @capacitor/core @capacitor/cli @capacitor/android

      - name: Generate Android project
        run: |
          npx cap init "Biweis" "com.greytaiwolf.biweis" --web-dir=www --npm-client=npm
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: biweis-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/apk-')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
