name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix-ai-connection-failure
    tags:
      - "apk-*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install web dependencies
        run: npm ci

      - name: Prepare static web assets
        run: |
          rm -rf www android capacitor.config.json
          mkdir -p www
          cp index.html styles.css app.js manifest.json www/
          cp -R data www/data

      - name: Install Capacitor
        run: npm install --no-save @capacitor/core@6.2.0 @capacitor/cli@6.2.0 @capacitor/android@6.2.0

      - name: Generate Android project
        run: |
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.greytaiwolf.biweis",
            "appName": "Biweis",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF
          npx cap add android
          npx cap sync android
          test -f android/gradlew
          ls -la android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: biweis-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/apk-')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
